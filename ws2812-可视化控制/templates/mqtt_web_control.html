<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WS2812 LED MQTT 控制系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #f0f0f0;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4444;
        }

        .status-indicator.connected {
            background: #44ff44;
        }

        .section {
            margin-bottom: 40px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 5px solid #667eea;
        }

        .section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .led-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .led-item {
            background: white;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .led-item:hover {
            transform: translateY(-5px);
        }

        .led-display {
            width: 100%;
            height: 100px;
            background: #000;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 3px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 12px;
        }

        .led-label {
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .color-picker-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .color-input {
            width: 100%;
            height: 40px;
            border: 2px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
        }

        .rgb-inputs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        input[type="number"] {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 12px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 100px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-success:hover {
            background: #229954;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }

        .btn-info {
            background: #3498db;
            color: white;
        }

        .btn-info:hover {
            background: #2980b9;
        }

        .animation-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .log-panel {
            background: #1e1e1e;
            color: #00ff00;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .log-line {
            padding: 3px 0;
            border-bottom: 1px solid #333;
        }

        .log-info {
            color: #4488ff;
        }

        .log-success {
            color: #00ff00;
        }

        .log-error {
            color: #ff4444;
        }

        .log-warning {
            color: #ffaa00;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
            font-size: 13px;
        }

        .control-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .led-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .control-panel {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌈 WS2812 LED MQTT 控制系统</h1>

        <div class="status-bar">
            <div class="status-item">
                <div class="status-indicator connected" id="serial-status"></div>
                <span>串口: <strong id="serial-text">未连接</strong></span>
            </div>
            <div class="status-item">
                <select id="serial-port-select" style="padding: 5px 8px; border-radius: 5px; border: 1px solid #ddd; font-size: 12px; min-width: 120px;">
                    <option value="">-- 选择串口 --</option>
                </select>
                <button onclick="connectSerial()" class="btn-primary" style="padding: 5px 12px; margin-left: 5px; font-size: 12px;">连接</button>
                <button onclick="disconnectSerial()" class="btn-danger" style="padding: 5px 12px; margin-left: 3px; font-size: 12px;">断开</button>
            </div>
            <div class="status-item">
                <span>LED 数量: <strong>8</strong></span>
            </div>
            <div class="status-item">
                <span>当前模式: <strong id="mode-text">手动</strong></span>
            </div>
        </div>

        <!-- LED 显示 -->
        <div class="section">
            <h2>LED 状态显示</h2>
            <div class="led-grid" id="led-display-grid"></div>
        </div>

        <!-- 控制面板 -->
        <div class="section">
            <h2>LED 控制</h2>
            <div class="control-panel">
                <!-- 左侧：单灯控制 -->
                <div>
                    <h3 style="color: #333; margin-bottom: 15px;">单灯控制</h3>
                    <div class="form-group">
                        <label for="led-select">选择 LED (0-7):</label>
                        <select id="led-select" style="width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #ddd;">
                            <option value="0">LED 0</option>
                            <option value="1">LED 1</option>
                            <option value="2">LED 2</option>
                            <option value="3">LED 3</option>
                            <option value="4">LED 4</option>
                            <option value="5">LED 5</option>
                            <option value="6">LED 6</option>
                            <option value="7">LED 7</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="color-picker">选择颜色:</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="color" id="color-picker" class="color-input" value="#ff0000">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>RGB 值:</label>
                        <div class="rgb-inputs">
                            <div>
                                <label style="font-size: 11px;">R</label>
                                <input type="number" id="r-value" min="0" max="255" value="255" style="width: 100%;">
                            </div>
                            <div>
                                <label style="font-size: 11px;">G</label>
                                <input type="number" id="g-value" min="0" max="255" value="0" style="width: 100%;">
                            </div>
                            <div>
                                <label style="font-size: 11px;">B</label>
                                <input type="number" id="b-value" min="0" max="255" value="0" style="width: 100%;">
                            </div>
                        </div>
                    </div>
                    <div class="button-group">
                        <button class="btn-primary" onclick="setLED()">设置 LED</button>
                    </div>
                </div>

                <!-- 右侧：全局控制 -->
                <div>
                    <h3 style="color: #333; margin-bottom: 15px;">全局控制</h3>
                    <div class="form-group">
                        <label>快速颜色:</label>
                        <div class="button-group" style="flex-wrap: wrap; gap: 8px;">
                            <button class="btn-danger" onclick="fillColor(255, 0, 0)" style="background: #e74c3c;">红</button>
                            <button class="btn-success" onclick="fillColor(0, 255, 0)" style="background: #27ae60;">绿</button>
                            <button class="btn-info" onclick="fillColor(0, 0, 255)" style="background: #3498db;">蓝</button>
                            <button class="btn-secondary" onclick="fillColor(255, 255, 255)" style="background: #34495e;">白</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>全灯设置:</label>
                        <div class="button-group">
                            <button class="btn-primary" onclick="fillAllColor()">应用全灯颜色</button>
                            <button class="btn-danger" onclick="clearAll()">全灯关闭</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>动画效果:</label>
                        <div style="display: grid; gap: 10px;">
                            <div>
                                <label style="font-size: 12px; color: #666;">🏃 流水灯</label>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px;">
                                    <select id="running-direction" style="padding: 8px; border-radius: 5px; border: 1px solid #ddd; font-size: 12px;">
                                        <option value="forward">正向</option>
                                        <option value="backward">反向</option>
                                    </select>
                                    <button class="btn-info" onclick="startAnimation('running')" style="padding: 8px;">启动</button>
                                </div>
                                <div style="display: grid; grid-template-columns: 80px 1fr; gap: 8px; align-items: center;">
                                    <label style="font-size: 11px; color: #666;">颜色:</label>
                                    <input type="color" id="running-color" value="#ff0000" style="padding: 5px; border-radius: 5px; border: 1px solid #ddd; cursor: pointer; height: 30px;">
                                </div>
                                <div style="display: grid; grid-template-columns: 80px 1fr 50px; gap: 8px; align-items: center; margin-top: 8px;">
                                    <label style="font-size: 11px; color: #666;">速度:</label>
                                    <input type="range" id="running-speed" min="0.15" max="0.5" step="0.05" value="0.2" style="width: 100%;">
                                    <span id="speed-display" style="font-size: 11px; text-align: right;">0.2s</span>
                                </div>
                            </div>

                            <div>
                                <label style="font-size: 12px; color: #666;">🌈 彩虹效果</label>
                                <button class="btn-info" onclick="startAnimation('rainbow')" style="width: 100%; padding: 8px;">启动</button>
                            </div>

                            <div>
                                <label style="font-size: 12px; color: #666;">💨 呼吸灯</label>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                                    <input type="color" id="breathing-color" value="#ff0000" style="padding: 5px; border-radius: 5px; border: 1px solid #ddd; cursor: pointer;">
                                    <button class="btn-info" onclick="startAnimation('breathing')" style="padding: 8px;">启动</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 日志面板 -->
        <div class="section">
            <h2>通信日志</h2>
            <button class="btn-secondary" onclick="clearLog()" style="margin-bottom: 10px;">清除日志</button>
            <div class="log-panel" id="log-panel"></div>
        </div>
    </div>

    <script>
        // 配置
        const MQTT_BROKER = 'ws://localhost:8080';  // MQTT WebSocket 地址
        const LED_COUNT = 8;

        let mqtt_client = null;
        let led_states = Array(LED_COUNT).fill([0, 0, 0]);
        let current_serial_port = null;

        // 更新串口连接状态
        function updateSerialStatus(connected, port = null) {
            const serialStatus = document.getElementById('serial-status');
            const serialText = document.getElementById('serial-text');
            if (connected) {
                serialStatus.className = 'status-indicator connected';
                serialText.textContent = `已连接 (${port})`;
                current_serial_port = port;
            } else {
                serialStatus.className = 'status-indicator';
                serialText.textContent = '未连接';
                current_serial_port = null;
            }
        }

        // 获取可用串口列表
        function loadSerialPorts() {
            fetch('/api/serial/list')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const select = document.getElementById('serial-port-select');
                        select.innerHTML = '<option value="">-- 选择串口 --</option>';

                        data.ports.forEach(port => {
                            const option = document.createElement('option');
                            option.value = port.device;
                            option.textContent = `${port.device} - ${port.description}`;
                            select.appendChild(option);
                        });

                        // 如果有当前连接，设置选中
                        if (data.current_port) {
                            select.value = data.current_port;
                            updateSerialStatus(true, data.current_port);
                        }

                        addLog('✓ 已刷新串口列表', 'success');
                    }
                })
                .catch(e => addLog('✗ 获取串口列表失败: ' + e, 'error'));
        }

        // 连接串口
        function connectSerial() {
            const port = document.getElementById('serial-port-select').value;
            if (!port) {
                addLog('⚠ 请先选择串口', 'warning');
                return;
            }

            fetch('/api/serial/connect', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ port: port })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    updateSerialStatus(true, port);
                    addLog(`✓ ${data.message}`, 'success');
                } else {
                    updateSerialStatus(false);
                    addLog(`✗ ${data.message}`, 'error');
                }
            })
            .catch(e => {
                addLog(`✗ 连接失败: ${e}`, 'error');
                updateSerialStatus(false);
            });
        }

        // 断开串口
        function disconnectSerial() {
            fetch('/api/serial/disconnect', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({})
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    updateSerialStatus(false);
                    addLog(`✓ ${data.message}`, 'success');
                    document.getElementById('serial-port-select').value = '';
                } else {
                    addLog(`✗ ${data.message}`, 'error');
                }
            })
            .catch(e => addLog(`✗ 断开失败: ${e}`, 'error'));
        }

        // 更新连接状态（保留旧函数，避免破坏现有代码）
        function updateConnectionStatus(connected) {
            // MQTT 状态已移除，此函数保留以兼容旧代码
            // 串口状态由 updateSerialStatus() 处理
        }

        // 初始化 LED 显示网格
        function initLEDGrid() {
            const grid = document.getElementById('led-display-grid');
            grid.innerHTML = '';
            for (let i = 0; i < LED_COUNT; i++) {
                const item = document.createElement('div');
                item.className = 'led-item';
                item.innerHTML = `
                    <div class="led-label">LED ${i}</div>
                    <div class="led-display" id="led-${i}" style="background: rgb(0,0,0);">
                        LED ${i}
                    </div>
                    <div style="font-size: 11px; color: #666;">RGB(0,0,0)</div>
                `;
                grid.appendChild(item);
            }
        }

        // 初始化 MQTT
        function initMQTT() {
            try {
                // 检查后端连接
                fetch('/api/status')
                    .then(response => response.json())
                    .then(data => {
                        if (data.mqtt_connected) {
                            addLog('✓ 后端已连接，MQTT 正常', 'success');
                            updateConnectionStatus(true);
                        } else {
                            addLog('⚠ 后端已连接，但 MQTT 未连接', 'warning');
                            updateConnectionStatus(false);
                        }
                    })
                    .catch(e => {
                        addLog('✗ 后端连接失败: ' + e, 'error');
                        updateConnectionStatus(false);
                    });
            } catch (e) {
                addLog('✗ 初始化失败: ' + e, 'error');
            }
        }

        // 更新 LED 显示
        function updateLEDDisplay(index, r, g, b) {
            if (index >= 0 && index < LED_COUNT) {
                led_states[index] = [r, g, b];
                const display = document.getElementById(`led-${index}`);
                if (display) {
                    display.style.background = `rgb(${r},${g},${b})`;
                    display.textContent = `RGB(${r},${g},${b})`;
                }
            }
        }

        // 颜色选择器变化
        document.getElementById('color-picker').addEventListener('change', function() {
            const hex = this.value;
            const r = parseInt(hex.substr(1, 2), 16);
            const g = parseInt(hex.substr(3, 2), 16);
            const b = parseInt(hex.substr(5, 2), 16);
            document.getElementById('r-value').value = r;
            document.getElementById('g-value').value = g;
            document.getElementById('b-value').value = b;
        });

        // RGB 输入框变化
        ['r-value', 'g-value', 'b-value'].forEach(id => {
            document.getElementById(id).addEventListener('change', function() {
                const r = parseInt(document.getElementById('r-value').value) || 0;
                const g = parseInt(document.getElementById('g-value').value) || 0;
                const b = parseInt(document.getElementById('b-value').value) || 0;
                const hex = '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
                document.getElementById('color-picker').value = hex;
            });
        });

        // 设置单个 LED
        function setLED() {
            const index = parseInt(document.getElementById('led-select').value);
            const r = parseInt(document.getElementById('r-value').value) || 0;
            const g = parseInt(document.getElementById('g-value').value) || 0;
            const b = parseInt(document.getElementById('b-value').value) || 0;

            sendCommand('led/set', { index, r, g, b });
            updateLEDDisplay(index, r, g, b);
            addLog(`设置 LED${index} = RGB(${r},${g},${b})`, 'success');
        }

        // 快速填充颜色
        function fillColor(r, g, b) {
            document.getElementById('r-value').value = r;
            document.getElementById('g-value').value = g;
            document.getElementById('b-value').value = b;
            document.getElementById('color-picker').value = '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
        }

        // 全灯填充
        function fillAllColor() {
            const r = parseInt(document.getElementById('r-value').value) || 0;
            const g = parseInt(document.getElementById('g-value').value) || 0;
            const b = parseInt(document.getElementById('b-value').value) || 0;

            sendCommand('led/fill', { r, g, b });
            for (let i = 0; i < LED_COUNT; i++) {
                updateLEDDisplay(i, r, g, b);
            }
            addLog(`全灯设置 RGB(${r},${g},${b})`, 'success');
        }

        // 全灯关闭
        function clearAll() {
            sendCommand('led/clear', {});
            for (let i = 0; i < LED_COUNT; i++) {
                updateLEDDisplay(i, 0, 0, 0);
            }
            addLog('全灯已关闭', 'success');
        }

        // 十六进制转 RGB
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 0, g: 0, b: 0 };
        }

        // 开始动画
        function startAnimation(mode) {
            let payload = { mode };

            // 流水灯：添加方向、颜色和速度参数
            if (mode === 'running') {
                payload.direction = document.getElementById('running-direction').value || 'forward';
                const color = document.getElementById('running-color').value;
                const rgb = hexToRgb(color);
                payload.color = { r: rgb.r, g: rgb.g, b: rgb.b };
                payload.speed = parseFloat(document.getElementById('running-speed').value) || 0.2;
            }

            // 呼吸灯：添加颜色参数
            if (mode === 'breathing') {
                const color = document.getElementById('breathing-color').value;
                const rgb = hexToRgb(color);
                payload.color = { r: rgb.r, g: rgb.g, b: rgb.b };
            }

            sendCommand('led/animation', payload);
            document.getElementById('mode-text').textContent = {
                'running': '流水效果',
                'rainbow': '彩虹效果',
                'breathing': '呼吸效果'
            }[mode] || mode;
            addLog(`启动动画: ${mode}`, 'info');
        }

        // 发送命令
        function sendCommand(topic, payload) {
            // 使用 HTTP API 调用后端
            const apiMap = {
                'led/set': '/api/led/set',
                'led/fill': '/api/led/fill',
                'led/clear': '/api/led/clear',
                'led/animation': '/api/led/animation'
            };

            const apiUrl = apiMap[topic];
            if (!apiUrl) {
                addLog(`未知命令: ${topic}`, 'error');
                return;
            }

            fetch(apiUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    addLog(`✓ ${data.message}`, 'success');
                } else {
                    addLog(`✗ ${data.message}`, 'error');
                }
            })
            .catch(error => {
                addLog(`✗ 请求失败: ${error}`, 'error');
            });

            console.log(`发送: ${topic}`, payload);
            addLog(`→ ${topic}: ${JSON.stringify(payload)}`, 'info');
        }

        // 日志
        function addLog(message, type = 'info') {
            const logPanel = document.getElementById('log-panel');
            const line = document.createElement('div');
            line.className = `log-line log-${type}`;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logPanel.appendChild(line);
            logPanel.scrollTop = logPanel.scrollHeight;

            // 保持日志数量不超过 100 行
            while (logPanel.children.length > 100) {
                logPanel.removeChild(logPanel.firstChild);
            }
        }

        function clearLog() {
            document.getElementById('log-panel').innerHTML = '';
        }

        // 页面加载
        window.addEventListener('load', () => {
            initLEDGrid();
            loadSerialPorts();
            initMQTT();

            // 速度滑块事件 - 实时更新显示和动画
            const speedSlider = document.getElementById('running-speed');
            if (speedSlider) {
                speedSlider.addEventListener('input', function() {
                    document.getElementById('speed-display').textContent = this.value + 's';
                    // 如果正在运行流水灯，立即重新启动以应用新速度
                    const currentMode = document.getElementById('mode-text').textContent;
                    if (currentMode === '流水效果') {
                        startAnimation('running');
                    }
                });
            }

            addLog('系统已启动', 'success');
            addLog('准备好接收命令...', 'info');
            addLog('💡 提示: 请在顶部选择串口并点击"连接"', 'info');
        });
    </script>
</body>
</html>
